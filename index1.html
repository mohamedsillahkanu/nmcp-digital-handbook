<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>NMCP Digital Handbook | YouTube + PDF Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --primary: #0a2f44;
      --primary-dark: #06212e;
      --primary-light: #1c5a78;
      --accent: #e6b422;
      --accent-dark: #c99f1a;
      --gray-100: #f0f2f5;
      --gray-600: #475569;
      --gray-800: #1e293b;
      --nmcp-gold: #f5c842;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Oswald', Arial, sans-serif;
      background: linear-gradient(180deg, #0a2f44 0%, #041e2c 100%);
      min-height: 100vh;
    }
    
    .header {
      background: var(--primary);
      padding: 15px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .header-brand { display: flex; align-items: center; gap: 15px; color: white; }
    .logo-box { background: transparent; border-radius: 8px; padding: 0; line-height: 0; }
    .logo-box svg { display: block; border-radius: 8px; }
    .header-text h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; }
    .header-text p { font-size: 0.75rem; opacity: 0.9; font-style: italic; }
    
    .search-container { display: flex; flex: 1; max-width: 400px; min-width: 200px; }
    .search-box { flex: 1; position: relative; }
    .search-input {
      width: 100%;
      padding: 12px 45px 12px 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 25px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-family: 'Oswald', sans-serif;
      font-size: 0.95rem;
      outline: none;
    }
    .search-input::placeholder { color: rgba(255,255,255,0.6); }
    .search-input:focus { background: rgba(255,255,255,0.2); border-color: var(--accent); }
    .search-btn {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: var(--accent); border: none; border-radius: 50%;
      width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .search-btn svg { width: 16px; height: 16px; stroke: #000; }
    
    .search-results {
      position: absolute; top: 100%; left: 0; right: 0;
      background: white; border-radius: 12px; margin-top: 8px;
      max-height: 350px; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      display: none; z-index: 200;
    }
    .search-results.active { display: block; }
    .search-result-item { padding: 12px 18px; cursor: pointer; border-bottom: 1px solid #eee; }
    .search-result-item:hover { background: var(--gray-100); }
    .result-title { font-weight: 600; color: var(--primary); }
    .result-section { font-size: 0.8rem; color: var(--gray-600); margin-top: 2px; }
    .result-type { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; margin-left: 8px; }
    .result-type.book { background: #e3f2fd; color: #1565c0; }
    .result-type.video { background: #ffebee; color: #c62828; }
    .result-type.youtube { background: #ffebee; color: #c62828; }
    .no-results { padding: 20px; text-align: center; color: var(--gray-600); }
    
    .header-actions { display: flex; gap: 10px; }
    .btn {
      padding: 10px 16px; border-radius: 6px; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; font-family: 'Oswald', sans-serif; text-transform: uppercase;
      transition: all 0.3s ease; display: flex; align-items: center; gap: 6px; border: 2px solid transparent;
    }
    .btn-outline { background: transparent; border: 2px solid rgba(255,255,255,0.5); color: white; }
    .btn-outline:hover { background: rgba(255,255,255,0.15); border-color: white; }
    .btn-gold { background: var(--accent); border-color: var(--accent); color: #000; }
    .btn-gold:hover { background: var(--accent-dark); }
    
    .main { padding: 25px 30px; min-height: calc(100vh - 100px); }
    
    .section-nav {
      display: flex; align-items: center; gap: 15px; margin-bottom: 25px;
      background: rgba(10,47,68,0.7); padding: 15px 20px; border-radius: 12px; border: 1px solid rgba(230,180,34,0.4);
      backdrop-filter: blur(4px);
    }
    .section-nav-btn {
      width: 45px; height: 45px; border-radius: 50%; background: var(--primary);
      border: 2px solid var(--accent); color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.3s ease;
    }
    .section-nav-btn:hover:not(:disabled) { background: var(--primary-light); transform: scale(1.1); }
    .section-nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .section-nav-btn svg { width: 20px; height: 20px; }
    .section-tabs { display: flex; gap: 10px; flex: 1; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
    .section-tabs::-webkit-scrollbar { display: none; }
    .section-tab {
      padding: 12px 24px; background: rgba(255,255,255,0.1); border: 2px solid transparent;
      border-radius: 25px; color: white; font-family: 'Oswald', sans-serif; font-size: 0.95rem;
      font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.3s ease;
      display: flex; align-items: center; gap: 8px;
    }
    .section-tab:hover { background: rgba(255,255,255,0.2); }
    .section-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
    .tab-count { background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; }
    .section-tab.active .tab-count { background: rgba(0,0,0,0.15); }
    
    .section-header {
      background: var(--primary); color: white; padding: 15px 25px; border-radius: 8px;
      display: flex; align-items: center; gap: 15px; margin-bottom: 20px;
      border-left: 6px solid var(--accent);
    }
    .section-icon { font-size: 2rem; }
    .section-title { font-size: 1.3rem; font-weight: 700; text-transform: uppercase; }
    .section-subtitle { font-size: 0.85rem; opacity: 0.9; }
    
    /* BOOKSHELF STYLE */
    .bookshelf {
      background: radial-gradient(circle at center, #3a4050 1.5px, transparent 1.5px);
      background-size: 10px 10px; background-color: #1e2028; border-radius: 16px;
      position: relative; box-shadow: 0 30px 80px rgba(0,0,0,0.8); border: 1px solid #2a2d35;
    }

    .shelf-row {
      display: flex;
      justify-content: space-evenly;
      align-items: flex-end;
      flex-wrap: wrap;
      padding: 40px 30px 55px;
      min-height: 300px;
      position: relative;
      z-index: 2;
      width: 100%;
      gap: 20px;
    }
    .shelf-row::before {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40px;
      background: linear-gradient(180deg, #35393f 0%, #25282e 30%, #1a1c20 70%, #0f1012 100%);
      border-top: 1px solid #45494f;
    }
    .shelf-row::after {
      content: ''; position: absolute; bottom: 2px; left: 40px; right: 40px; height: 3px;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 10%, #ffdd77 50%, var(--accent) 90%, transparent 100%);
      border-radius: 3px; box-shadow: 0 0 8px #e6b422, 0 0 15px rgba(230,180,34,0.5); z-index: 10;
    }
    .empty-shelf-message {
      width: 100%; text-align: center; color: rgba(230,180,34,0.7);
      font-size: 1.1rem; padding: 80px 40px; font-style: italic;
    }
    
    /* BOOK CARD */
    .book {
      position: relative; cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      filter: drop-shadow(0 8px 15px rgba(0,0,0,0.6));
      flex: 0 0 auto;
      width: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .book:hover { transform: translateY(-15px) scale(1.05); z-index: 10; }
    .book:hover .book-info { opacity: 1; transform: translateX(-50%) translateY(0); }
    .book:hover .book-front { box-shadow: 0 0 20px rgba(230,180,34,0.4), 0 0 40px rgba(230,180,34,0.2); }

    .book-front {
      width: 100%;
      max-width: 120px;
      aspect-ratio: 130 / 190;
      border-radius: 4px; overflow: hidden;
      box-shadow: 4px 4px 15px rgba(0,0,0,0.4);
      background: linear-gradient(145deg, #1c5a78, #0a2f44);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
    }
    .book-front-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, rgba(0,0,0,0.2) 0%, transparent 15%, transparent 85%, rgba(0,0,0,0.1) 100%);
    }
    .book-pages-edge {
      position: absolute; top: 3px; bottom: 3px; right: -10px; width: 10px;
      background: linear-gradient(90deg, #f5f5f0, #e8e8e3, #f0f0eb, #e5e5e0, #d8d8d3);
      border-radius: 0 2px 2px 0; box-shadow: 2px 0 4px rgba(0,0,0,0.2);
    }
    .book-info {
      position: absolute; top: -85px; left: 50%; transform: translateX(-50%) translateY(-10px);
      background: #2a2d35; color: white; padding: 12px 15px; border-radius: 8px; width: 190px;
      opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 20;
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    }
    .book-info h4 { font-size: 0.85rem; font-weight: 600; line-height: 1.3; }
    .book-info p { font-size: 0.7rem; opacity: 0.8; margin-top: 5px; }
    .book-info::after {
      content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
      border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 8px solid #2a2d35;
    }
    
    /* MODAL for YouTube / PDF / MP4 */
    .reader-view {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(180deg, #0a2f44 0%, #041e2c 100%);
      z-index: 200; display: flex; flex-direction: column;
      opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
    }
    .reader-view.active { opacity: 1; pointer-events: all; }
    .reader-header { background: var(--primary); padding: 12px 25px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .reader-title { color: white; font-size: 1.1rem; font-weight: 700; }
    .reader-controls { display: flex; gap: 10px; }
    .media-container-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      position: relative;
    }
    .media-box {
      background: rgba(0,0,0,0.6);
      border-radius: 24px;
      padding: 20px;
      max-width: 1100px;
      width: 90%;
      backdrop-filter: blur(4px);
      text-align: center;
    }
    .youtube-embed {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 16px;
      border: none;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .video-player {
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      background: black;
    }
    .pdf-viewer-panel {
      background: white;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
    }
    .pdf-canvas-area {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .pdf-controls {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
    }
    .pdf-nav-btn {
      background: var(--accent);
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Oswald', sans-serif;
    }
    .loading-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 500; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .loading-overlay.active { opacity: 1; pointer-events: all; }
    .notification {
      position: fixed; top: 100px; left: 50%; transform: translateX(-50%) translateY(-20px);
      padding: 12px 28px; border-radius: 40px; font-weight: 600; z-index: 600;
      opacity: 0; pointer-events: none; transition: all 0.3s ease;
      background: var(--accent); color: #000;
    }
    .notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .footer { background: var(--primary); color: white; padding: 20px 40px; text-align: center; font-size: 0.9rem; }
    
    @media (max-width: 780px) {
      .book { width: 120px; }
      .section-tab { padding: 8px 16px; font-size: 0.8rem; }
      .media-box { width: 95%; }
      .youtube-embed { aspect-ratio: 16/9; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-brand">
      <div class="logo-box">
        <svg width="52" height="52" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
          <defs><linearGradient id="nmcpGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0a2f44"/><stop offset="100%" stop-color="#1c5a78"/></linearGradient></defs>
          <rect width="52" height="52" fill="url(#nmcpGrad)" rx="8"/>
          <rect x="0" y="0" width="52" height="3" fill="#e6b422" rx="2"/>
          <rect x="0" y="49" width="52" height="3" fill="#e6b422" rx="2"/>
          <text x="6" y="36" font-family="Oswald, sans-serif" font-size="18" font-weight="700" fill="#e6b422">NMCP</text>
        </svg>
      </div>
      <div class="header-text"><h1>NMCP DIGITAL HANDBOOK</h1><p>YouTube | PDF | MP4 Integrated Library</p></div>
    </div>
    <div class="search-container">
      <div class="search-box">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search books, YouTube videos, manuals..." oninput="handleSearch(this.value)">
        <button class="search-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></button>
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline" onclick="toggleSound()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        <span id="soundLabel">Sound On</span>
      </button>
    </div>
  </header>

  <main class="main">
    <div class="section-nav">
      <button class="section-nav-btn" id="prevSectionBtn" onclick="prevSection()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></button>
      <div class="section-tabs" id="sectionTabs"></div>
      <button class="section-nav-btn" id="nextSectionBtn" onclick="nextSection()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg></button>
    </div>
    <div class="section-header">
      <div class="section-icon" id="sectionIcon">📚</div>
      <div><div class="section-title" id="sectionTitle">NMCP Official Collection</div><div class="section-subtitle" id="sectionSubtitle">Handbooks + Media</div></div>
    </div>
    <div class="bookshelf" id="bookshelf"><div class="shelf-row"><div class="empty-shelf-message">Loading NMCP Library...</div></div></div>
  </main>

  <footer class="footer"><p><strong>NMCP Digital Handbook</strong> — Naval Military Command | Integrated YouTube, PDF & MP4 Learning Hub</p></footer>

  <!-- Reader Modal -->
  <div class="reader-view" id="readerView">
    <div class="reader-header">
      <div class="reader-title" id="readerTitle">NMCP Resource</div>
      <div class="reader-controls">
        <button class="btn btn-gold" onclick="closeReader()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg> Close</button>
      </div>
    </div>
    <div class="media-container-main" id="mediaContainerMain"></div>
  </div>

  <div class="loading-overlay" id="loadingOverlay"><div style="background:#e6b422; padding:20px 40px; border-radius:50px; color:#000; font-weight:bold;">Loading NMCP content...</div></div>
  <div class="notification" id="notification"></div>

  <script>
    // ==================== NMCP LIBRARY DATA (YouTube + PDF + MP4) ====================
    const libraryData = {
      sections: [
        { id: 'all', name: 'All Resources', icon: '📚', description: 'Browse all NMCP materials', books: [] },
        { id: 'manuals', name: 'Operational Manuals', icon: '📘', description: 'Official NMCP handbooks & SOPs (PDF)', books: [] },
        { id: 'youtube', name: 'YouTube Training', icon: '▶️', description: 'NMCP Video Playlists & Tutorials', books: [] },
        { id: 'digital', name: 'Digital Systems', icon: '💻', description: 'Cybersecurity & IT guides', books: [] },
        { id: 'leadership', name: 'Leadership Series', icon: '⚓', description: 'Strategic command insights', books: [] }
      ]
    };

    // Populate manuals (PDFs)
    libraryData.sections[1].books = [
      { title: "NMCP Standing Orders", type: "pdf", url: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf", desc: "Standard operating procedures" },
      { title: "Maritime Safety Handbook", type: "pdf", url: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf", desc: "Safety at sea protocols" }
    ];
    
    // YouTube videos embedded - using official YouTube embed links
    libraryData.sections[2].books = [
      { title: "Naval Navigation Basics", type: "youtube", url: "https://youtu.be/Jt3k97hQ8ck", desc: "Introduction to ship navigation", thumb: "🎬" },
      { title: "Leadership at Sea (NMCP)", type: "youtube", url: "https://www.youtube.com/embed/tgbNymZ7vqY", desc: "Command & leadership principles", thumb: "⚓" },
      { title: "Cybersecurity Awareness", type: "youtube", url: "https://www.youtube.com/embed/3KtWfp0UopM", desc: "Digital defense for modern navy", thumb: "🔐" },
      { title: "Damage Control Procedures", type: "youtube", url: "https://www.youtube.com/embed/jfKfPfyJRdk", desc: "Emergency response training", thumb: "🚨" }
    ];
    
    libraryData.sections[3].books = [
      { title: "Cybersecurity Fundamentals (PDF)", type: "pdf", url: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf", desc: "NMCP cyber resilience guide" },
      { title: "NMCP IT Infrastructure", type: "pdf", url: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf", desc: "Digital systems overview" }
    ];
    
    libraryData.sections[4].books = [
      { title: "Command Philosophy (PDF)", type: "pdf", url: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf", desc: "Ethos & leadership handbook" },
      { title: "Strategic Naval Insight (YouTube)", type: "youtube", url: "https://www.youtube.com/embed/tgbNymZ7vqY", desc: "Admiral's address on modern warfare", thumb: "🎖️" }
    ];

    // Helper: Extract YouTube ID from any format (just in case)
    function getYoutubeEmbedUrl(url) {
      if (url.includes('youtube.com/embed/')) return url;
      if (url.includes('youtu.be/')) {
        const videoId = url.split('youtu.be/')[1]?.split('?')[0];
        return `https://www.youtube.com/embed/${videoId}`;
      }
      if (url.includes('watch?v=')) {
        const videoId = url.split('v=')[1]?.split('&')[0];
        return `https://www.youtube.com/embed/${videoId}`;
      }
      return url; // fallback
    }

    function getAllBooks() {
      let all = [];
      for (let i = 1; i < libraryData.sections.length; i++) {
        const sect = libraryData.sections[i];
        sect.books.forEach(b => all.push({ ...b, sectionName: sect.name, sectionIcon: sect.icon, sectionId: sect.id }));
      }
      return all;
    }
    libraryData.sections[0].books = getAllBooks();

    // State
    let currentSectionIndex = 0;
    let currentBooks = [];
    let soundEnabled = true;
    let currentPdfDoc = null, currentPdfPage = 1, totalPdfPages = 0;

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    function playFlipSound() {
      if (!soundEnabled) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 320;
        gain.gain.value = 0.1;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.25);
        osc.stop(ctx.currentTime + 0.23);
        if (ctx.state === 'suspended') ctx.resume();
      } catch(e) {}
    }

    function showNotification(msg, isError = false) {
      const n = document.getElementById('notification');
      n.textContent = msg;
      n.style.background = isError ? '#a12a2a' : '#e6b422';
      n.style.color = '#000';
      n.classList.add('show');
      setTimeout(() => n.classList.remove('show'), 2800);
    }

    function renderTabs() {
      const container = document.getElementById('sectionTabs');
      container.innerHTML = libraryData.sections.map((s, i) => 
        `<button class="section-tab ${i === 0 ? 'active' : ''}" onclick="loadSection(${i})"><span>${s.icon}</span><span>${s.name}</span><span class="tab-count">${getCount(s)}</span></button>`
      ).join('');
    }

    function getCount(s) { 
      if (s.id === 'all') return getAllBooks().length;
      return s.books?.length || 0; 
    }

    async function loadSection(index) {
      currentSectionIndex = index;
      const section = libraryData.sections[index];
      document.querySelectorAll('.section-tab').forEach((tab, i) => tab.classList.toggle('active', i === index));
      document.getElementById('sectionIcon').textContent = section.icon;
      document.getElementById('sectionTitle').textContent = section.name;
      currentBooks = section.id === 'all' ? getAllBooks() : (section.books || []).map(b => ({ ...b, sectionName: section.name, sectionIcon: section.icon }));
      document.getElementById('sectionSubtitle').textContent = `${currentBooks.length} resource${currentBooks.length !== 1 ? 's' : ''} (YouTube + PDF)`;
      renderBookshelf();
      updateNavButtons();
    }

    function renderBookshelf() {
      const shelfDiv = document.getElementById('bookshelf');
      if (!currentBooks.length) {
        shelfDiv.innerHTML = `<div class="shelf-row"><div class="empty-shelf-message">No resources in this category</div></div>`;
        return;
      }
      const BOOKS_PER_ROW = 6;
      let rows = [];
      for (let i = 0; i < currentBooks.length; i += BOOKS_PER_ROW) rows.push(currentBooks.slice(i, i + BOOKS_PER_ROW));
      while (rows.length < 2) rows.push([]);
      
      shelfDiv.innerHTML = rows.map(row => `
        <div class="shelf-row">
          ${row.map((book, idx) => {
            const globalIdx = currentBooks.indexOf(book);
            const iconEmoji = book.type === 'youtube' ? '▶️' : (book.type === 'video' ? '🎬' : '📄');
            return `<div class="book" onclick="openResource(${globalIdx})">
              <div class="book-front">
                <span style="font-size:2.5rem;">${iconEmoji}</span>
                <div class="book-front-overlay"></div>
              </div>
              <div class="book-pages-edge"></div>
              <div class="book-info">
                <h4>${book.title}</h4>
                <p>${book.type === 'youtube' ? '🎥 YouTube Video' : (book.type === 'video' ? '🎬 MP4' : '📖 PDF')} • ${book.sectionIcon || ''}</p>
              </div>
            </div>`;
          }).join('')}
        </div>
      `).join('');
    }

    async function openResource(index) {
      const res = currentBooks[index];
      if (!res) return;
      showNotification(`Opening: ${res.title}`);
      document.getElementById('readerView').classList.add('active');
      document.getElementById('readerTitle').innerHTML = `${res.type === 'youtube' ? '🎥 YOUTUBE' : (res.type === 'video' ? '🎬 MP4' : '📑 HANDBOOK')} : ${res.title}`;
      const container = document.getElementById('mediaContainerMain');
      container.innerHTML = '';
      
      if (res.type === 'youtube') {
        const embedUrl = getYoutubeEmbedUrl(res.url);
        container.innerHTML = `
          <div class="media-box">
            <iframe class="youtube-embed" src="${embedUrl}?autoplay=1&rel=0" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            <p style="color:white; margin-top:15px;">${res.desc || 'NMCP Official Training'}</p>
          </div>`;
      } 
      else if (res.type === 'video') {
        container.innerHTML = `<div class="media-box"><video class="video-player" controls autoplay src="${res.url}">MP4 not supported</video><p style="color:white; margin-top:15px;">${res.desc || 'NMCP Training Video'}</p></div>`;
      }
      else if (res.type === 'pdf') {
        container.innerHTML = `
          <div class="media-box pdf-viewer-panel">
            <div id="pdfCanvasContainer" style="display:flex; justify-content:center; min-height:400px;"></div>
            <div class="pdf-controls">
              <button class="pdf-nav-btn" id="pdfPrevBtnNMCP">◀ Previous</button>
              <span id="pdfPageNumDisplay" style="margin:0 20px; font-weight:bold;">Page 1 / ?</span>
              <button class="pdf-nav-btn" id="pdfNextBtnNMCP">Next ▶</button>
            </div>
          </div>`;
        await loadPdfDocument(res.url);
      }
    }

    async function loadPdfDocument(url) {
      const loadingDiv = document.getElementById('loadingOverlay');
      loadingDiv.classList.add('active');
      try {
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
        let response = await fetch(proxyUrl);
        if (!response.ok) response = await fetch(url);
        const buffer = await response.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
        currentPdfDoc = pdf;
        totalPdfPages = pdf.numPages;
        currentPdfPage = 1;
        await renderPdfPage(currentPdfPage);
        document.getElementById('pdfPageNumDisplay').innerText = `Page ${currentPdfPage} / ${totalPdfPages}`;
        attachPdfEvents();
      } catch(e) {
        console.error(e);
        showNotification("PDF load error. Check file access.", true);
        document.getElementById('pdfCanvasContainer').innerHTML = `<div style="color:red;">❌ Failed to load PDF document.</div>`;
      } finally {
        loadingDiv.classList.remove('active');
      }
    }

    async function renderPdfPage(pageNum) {
      if (!currentPdfDoc) return;
      const page = await currentPdfDoc.getPage(pageNum);
      const scale = 1.4;
      const viewport = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      canvas.style.width = '100%';
      canvas.style.height = 'auto';
      canvas.style.maxWidth = '700px';
      canvas.style.borderRadius = '12px';
      canvas.style.boxShadow = '0 8px 20px rgba(0,0,0,0.3)';
      await page.render({ canvasContext: ctx, viewport }).promise;
      const container = document.getElementById('pdfCanvasContainer');
      if (container) {
        container.innerHTML = '';
        container.appendChild(canvas);
      }
      playFlipSound();
    }

    function attachPdfEvents() {
      const prevBtn = document.getElementById('pdfPrevBtnNMCP');
      const nextBtn = document.getElementById('pdfNextBtnNMCP');
      if (prevBtn) prevBtn.onclick = async () => {
        if (currentPdfPage > 1) { currentPdfPage--; await renderPdfPage(currentPdfPage); document.getElementById('pdfPageNumDisplay').innerText = `Page ${currentPdfPage} / ${totalPdfPages}`; playFlipSound(); }
      };
      if (nextBtn) nextBtn.onclick = async () => {
        if (currentPdfPage < totalPdfPages) { currentPdfPage++; await renderPdfPage(currentPdfPage); document.getElementById('pdfPageNumDisplay').innerText = `Page ${currentPdfPage} / ${totalPdfPages}`; playFlipSound(); }
      };
    }

    function closeReader() {
      document.getElementById('readerView').classList.remove('active');
      document.getElementById('mediaContainerMain').innerHTML = '';
      currentPdfDoc = null;
    }

    function prevSection() { if (currentSectionIndex > 0) loadSection(currentSectionIndex - 1); }
    function nextSection() { if (currentSectionIndex < libraryData.sections.length - 1) loadSection(currentSectionIndex + 1); }
    function updateNavButtons() {
      document.getElementById('prevSectionBtn').disabled = currentSectionIndex === 0;
      document.getElementById('nextSectionBtn').disabled = currentSectionIndex === libraryData.sections.length - 1;
    }
    function toggleSound() { 
      soundEnabled = !soundEnabled; 
      document.getElementById('soundLabel').textContent = soundEnabled ? 'Sound On' : 'Muted';
      showNotification(`Page flip sound ${soundEnabled ? 'ON' : 'OFF'}`);
    }

    // Search across all
    function handleSearch(q) {
      if (!q.trim()) { document.getElementById('searchResults').classList.remove('active'); return; }
      const all = getAllBooks();
      const filtered = all.filter(b => b.title.toLowerCase().includes(q.toLowerCase()) || (b.desc || '').toLowerCase().includes(q.toLowerCase()));
      const resultsDiv = document.getElementById('searchResults');
      if (!filtered.length) {
        resultsDiv.innerHTML = `<div class="no-results">No NMCP resources match "${q}"</div>`;
      } else {
        resultsDiv.innerHTML = filtered.map(r => `
          <div class="search-result-item" data-title="${r.title}" data-type="${r.type}" data-sectionid="${r.sectionId}">
            <div class="result-title">${r.title}<span class="result-type ${r.type === 'youtube' ? 'youtube' : 'book'}">${r.type === 'youtube' ? '🎬 YouTube' : (r.type === 'video' ? 'MP4' : 'PDF')}</span></div>
            <div class="result-section">${r.sectionIcon} ${r.sectionName}</div>
          </div>
        `).join('');
        document.querySelectorAll('.search-result-item').forEach(el => {
          el.addEventListener('click', async () => {
            const title = el.getAttribute('data-title');
            const found = all.find(f => f.title === title);
            if (found) {
              const targetSection = libraryData.sections.find(s => s.id === found.sectionId);
              const secIdx = libraryData.sections.findIndex(s => s.id === targetSection?.id);
              if (secIdx !== -1) {
                await loadSection(secIdx);
                setTimeout(() => {
                  const bookIdx = currentBooks.findIndex(b => b.title === found.title);
                  if (bookIdx !== -1) openResource(bookIdx);
                }, 200);
              }
              document.getElementById('searchResults').classList.remove('active');
              document.getElementById('searchInput').value = '';
            }
          });
        });
      }
      resultsDiv.classList.add('active');
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderTabs();
      loadSection(0);
      document.addEventListener('click', (e) => { if (!e.target.closest('.search-box')) document.getElementById('searchResults').classList.remove('active'); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && document.getElementById('readerView').classList.contains('active')) closeReader(); });
    });
  </script>
</body>
</html>
